<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookings | Great God Guest House</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
    .available { color: green; font-weight: bold; }
    .booked { color: orange; font-weight: bold; }
    .room-status { font-size: 0.9em; margin-top: 5px; }
</style>
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <div class="logo"><h2>GREAT GOD GUEST HOUSE</h2></div>
        <nav>
            <a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="bookings.html" class="active"><i class="fas fa-calendar-check"></i> Bookings</a>
            <a href="rooms.html"><i class="fas fa-bed"></i> Rooms</a>
            <a href="guests.html"><i class="fas fa-users"></i> Guests</a>
            <a href="reports.html"><i class="fas fa-chart-pie"></i> Reports</a>
            <a href="settings.html"><i class="fas fa-gear"></i> Settings</a>
        </nav>
    </aside>

    <main class="main">
        <header class="topbar">
            <h1>Bookings</h1>
            <div class="profile">
                <i class="fas fa-bell"></i>
                <span>Receptionist</span>
            </div>
        </header>

        <section class="booking-form">
            <h2>New Booking</h2>
            <form id="bookingForm" action="https://formsubmit.co/lwfmolaleye@gmail.com" method="POST">
                <input type="hidden" name="_subject" value="New Hotel Booking Received">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_template" value="table">

                <div class="grid">
                    <div>
                        <label>Guest Name</label>
                        <input type="text" id="guestName" name="GuestName" required>
                    </div>
                    <div>
                        <label>Phone Number</label>
                        <input type="text" id="phoneNumber" name="PhoneNumber" required>
                    </div>
                    <div>
                        <label>Room Type</label>
                        <select id="roomType" required>
                            <option value="">Select Type</option>
                            <option>Standard</option>
                            <option>Deluxe</option>
                            <option>Executive</option>
                            <option>Suite</option>
                        </select>
                    </div>
                    <div>
                        <label>Available Room</label>
                        <select id="roomNumber" name="RoomName" required>
                            <option value="">Select dates first...</option>
                        </select>
                        <div id="roomStatus" class="room-status"></div>
                    </div>
                    <div>
                        <label>Check In</label>
                        <input type="date" id="checkIn" required>
                    </div>
                    <div>
                        <label>Intended Check Out</label>
                        <input type="date" id="checkOut" required>
                    </div>
                    <!-- Other fields -->
                    <div>
                        <label>Payment Method</label>
                        <select id="paymentMethod" name="PaymentMethod" required>
                            <option value="">Select</option>
                            <option>Cash</option>
                            <option>POS</option>
                            <option>Transfer</option>
                        </select>
                    </div>
                    <div>
                        <label>Amount (₦)</label>
                        <select id="amount" name="Amount" required>
                            <option value="30000">30,000</option>
                            <option value="35000">35,000</option>
                            <option value="40000">40,000</option>
                            <option value="50000">50,000</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="primary-btn">Book Room</button>
            </form>
        </section>

        <section class="search-box">
            <input type="text" id="bookingSearch" placeholder="Search guest, room or phone...">
        </section>

        <section class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Guest</th>
                        <th>Phone</th>
                        <th>Room</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Check In</th>
                        <th>Check Out</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>
</div>

<script>
// ==================== ROOM DATABASE ====================
const allRooms = [
    { id: "Excellence", type: "Executive", status: "Available" },
    { id: "Elegance", type: "Deluxe", status: "Available" },
    { id: "Sapphire", type: "Suite", status: "Available" },
    { id: "GOLD", type: "Executive", status: "Available" },
    { id: "Emerald", type: "Deluxe", status: "Available" },
    { id: "Amazing", type: "Standard", status: "Available" },
    { id: "Comfort", type: "Standard", status: "Available" },
    { id: "Diamond", type: "Suite", status: "Available" },
    { id: "Awesome", type: "Deluxe", status: "Available" },
    { id: "Californium", type: "Executive", status: "Available" }
];

let bookings = JSON.parse(localStorage.getItem("bookings") || "[]");

// ==================== DATE OVERLAP CHECK ====================
function isDateOverlap(checkIn1, checkOut1, checkIn2, checkOut2) {
    const start1 = new Date(checkIn1);
    const end1 = new Date(checkOut1);
    const start2 = new Date(checkIn2);
    const end2 = new Date(checkOut2);
    
    return start1 < end2 && start2 < end1;
}

// ==================== GET AVAILABLE ROOMS ====================
function getAvailableRooms(checkIn, checkOut) {
    if (!checkIn || !checkOut) return allRooms;

    return allRooms.filter(room => {
        const conflictingBookings = bookings.filter(booking => 
            booking.room === room.id && 
            isDateOverlap(checkIn, checkOut, booking.checkIn, booking.checkOut)
        );
        return conflictingBookings.length === 0;
    });
}

// ==================== RENDER AVAILABLE ROOMS ====================
function updateAvailableRooms() {
    const checkIn = document.getElementById("checkIn").value;
    const checkOut = document.getElementById("checkOut").value;
    const roomSelect = document.getElementById("roomNumber");
    const statusDiv = document.getElementById("roomStatus");

    const available = getAvailableRooms(checkIn, checkOut);

    roomSelect.innerHTML = `<option value="">Select Room</option>`;

    available.forEach(room => {
        const option = document.createElement("option");
        option.value = room.id;
        option.textContent = `${room.id} (${room.type})`;
        roomSelect.appendChild(option);
    });

    if (available.length === 0) {
        statusDiv.innerHTML = `<span class="booked">❌ No rooms available for selected dates</span>`;
    } else {
        statusDiv.innerHTML = `<span class="available">✅ ${available.length} room(s) available</span>`;
    }
}

// ==================== MAIN APP ====================
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("bookingForm");
    const tableBody = document.querySelector("#dataTable tbody");
    const searchInput = document.getElementById("bookingSearch");

    // Set today's date
    document.getElementById("dateFilled").value = new Date().toISOString().split("T")[0];

    function renderTable() {
        tableBody.innerHTML = "";
        bookings.forEach((b, index) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${b.guest}</td>
                <td>${b.phone}</td>
                <td>${b.room}</td>
                <td>${b.type}</td>
                <td>₦${parseInt(b.amount).toLocaleString()}</td>
                <td>${b.checkIn}</td>
                <td>${b.checkOut}</td>
                <td><span style="color:green">Confirmed</span></td>
                <td>
                    <button class="delete-btn" data-index="${index}">Delete</button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    // Event Listeners for Date Changes
    document.getElementById("checkIn").addEventListener("change", updateAvailableRooms);
    document.getElementById("checkOut").addEventListener("change", updateAvailableRooms);

    // Form Submit
    form.addEventListener("submit", function(e) {
        const roomSelect = document.getElementById("roomNumber");
        
        if (!roomSelect.value) {
            e.preventDefault();
            alert("Please select an available room.");
            return;
        }

        const booking = {
            guest: document.getElementById("guestName").value,
            phone: document.getElementById("phoneNumber").value,
            room: roomSelect.value,
            type: document.getElementById("roomType").value,
            checkIn: document.getElementById("checkIn").value,
            checkOut: document.getElementById("checkOut").value,
            amount: document.getElementById("amount").value,
        };

        bookings.push(booking);
        localStorage.setItem("bookings", JSON.stringify(bookings));
        renderTable();
        updateAvailableRooms();

        alert("✅ Booking confirmed successfully!");
    });

    // Search
    searchInput.addEventListener("input", () => {
        const term = searchInput.value.toLowerCase();
        const filtered = bookings.filter(b => 
            b.guest.toLowerCase().includes(term) || 
            b.phone.includes(term) || 
            b.room.toLowerCase().includes(term)
        );
        // Simple re-render with filtered data (you can enhance this)
        console.log("Filtered:", filtered);
    });

    // Initial render
    renderTable();
    updateAvailableRooms();
});
</script>
</body>
</html>
