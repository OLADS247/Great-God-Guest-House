<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookings | Great God Guest House</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
    .action-btn {
        padding: 5px 10px;
        margin: 0 3px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.9em;
    }
    .edit-btn { background: #007bff; color: white; }
    .delete-btn { background: #dc3545; color: white; }
    .success { color: green; font-weight: bold; }
    .table-container { overflow-x: auto; }
    table th, table td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
</style>
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <div class="logo"><h2>GREAT GOD GUEST HOUSE</h2></div>
        <nav>
            <a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="bookings.html" class="active"><i class="fas fa-calendar-check"></i> Bookings</a>
            <a href="rooms.html"><i class="fas fa-bed"></i> Rooms</a>
            <a href="guests.html"><i class="fas fa-users"></i> Guests</a>
            <a href="reports.html"><i class="fas fa-chart-pie"></i> Reports</a>
            <a href="settings.html"><i class="fas fa-gear"></i> Settings</a>
        </nav>
    </aside>

    <main class="main">
        <header class="topbar">
            <h1>Bookings</h1>
            <div class="profile">
                <i class="fas fa-bell"></i>
                <span>Receptionist</span>
            </div>
        </header>

        <section class="booking-form">
            <h2>New Booking</h2>
            <form id="bookingForm" action="https://formsubmit.co/lwfmolaleye@gmail.com" method="POST">
                <input type="hidden" name="_subject" value="New Hotel Booking Received">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_template" value="table">

                <div class="grid">
                    <div><label>Guest Name</label><input type="text" id="guestName" name="GuestName" required></div>
                    <div><label>Phone Number</label><input type="text" id="phoneNumber" name="PhoneNumber" required></div>
                    <div><label>Room Type</label>
                        <select id="roomType" name="RoomType" required>
                            <option value="">Select Type</option>
                            <option>Standard</option><option>Deluxe</option>
                            <option>Executive</option><option>Suite</option>
                        </select>
                    </div>
                    <div><label>Room</label>
                        <select id="roomNumber" name="RoomName" required>
                            <option value="">Select Room</option>
                            <option>Excellence</option><option>Elegance</option>
                            <option>Sapphire</option><option>GOLD</option>
                            <option>Emerald</option><option>Amazing</option>
                            <option>Comfort</option><option>Diamond</option>
                            <option>Awesome</option><option>Californium</option>
                        </select>
                    </div>
                    <div><label>Check In</label><input type="date" id="checkIn" name="CheckIn" required></div>
                    <div><label>Intended Check Out</label><input type="date" id="checkOut" name="IntendedCheckOutDate" required></div>
                    <div><label>Payment Method</label>
                        <select id="paymentMethod" name="PaymentMethod" required>
                            <option value="">Select</option>
                            <option>Cash</option><option>POS</option><option>Transfer</option>
                        </select>
                    </div>
                    <div><label>Amount (₦)</label>
                        <select id="amount" name="Amount" required>
                            <option value="30000">30,000</option>
                            <option value="35000">35,000</option>
                            <option value="40000">40,000</option>
                            <option value="50000">50,000</option>
                        </select>
                    </div>
                    <div><label>ID Type</label>
                        <select id="idType" name="IdentificationType" required>
                            <option value="" selected disabled>Select Identification</option>
                            <option value="National Identification Number (NIN)">NIN</option>
                            <option value="National ID Card">National ID Card</option>
                            <option value="International Passport">International Passport</option>
                            <option value="Driver's License">Driver's License</option>
                            <option value="Voter's Card">Voter's Card</option>
                            <option value="Residence Permit">Residence Permit</option>
                            <option value="Student ID">Student ID</option>
                            <option value="Employee ID">Employee ID</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div><label>ID Number</label>
                        <input type="text" id="idNumber" name="IdentificationNumber" placeholder="Enter ID Number" required>
                    </div>
                    <div><label>Receipt ID</label>
                        <input type="text" id="receiptId" name="ReceiptID" placeholder="e.g. RCP-2026-000145" required>
                    </div>
                    <div><label>Date Filled</label>
                        <input type="date" id="dateFilled" name="DateFilled" readonly>
                    </div>
                </div>
                <button type="submit" class="primary-btn">Book Room</button>
            </form>
        </section>

        <section class="search-box">
            <input type="text" id="bookingSearch" placeholder="Search by guest, room, or phone...">
        </section>

        <section class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Guest</th>
                        <th>Phone</th>
                        <th>Room</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Check In</th>
                        <th>Check Out</th>
                        <th>ID Type</th>
                        <th>ID Number</th>
                        <th>Receipt ID</th>
                        <th>Date Filled</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("bookingForm");
    const tableBody = document.querySelector("#dataTable tbody");
    const searchInput = document.getElementById("bookingSearch");
    let bookings = JSON.parse(localStorage.getItem("bookings") || "[]");

    // Set today's date
    document.getElementById("dateFilled").value = new Date().toISOString().split("T")[0];

    function renderTable(filteredBookings = bookings) {
        tableBody.innerHTML = "";
        filteredBookings.forEach((booking, index) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${booking.guest || ''}</td>
                <td>${booking.phone || ''}</td>
                <td>${booking.room || ''}</td>
                <td>${booking.type || ''}</td>
                <td>₦${parseInt(booking.amount || 0).toLocaleString()}</td>
                <td>${booking.checkIn || ''}</td>
                <td>${booking.checkOut || ''}</td>
                <td>${booking.idType || ''}</td>
                <td>${booking.idNumber || ''}</td>
                <td>${booking.receiptId || ''}</td>
                <td>${booking.dateFilled || ''}</td>
                <td><span class="success">Confirmed</span></td>
                <td>
                    <button class="action-btn edit-btn" data-index="${index}">Edit</button>
                    <button class="action-btn delete-btn" data-index="${index}">Delete</button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    form.addEventListener("submit", function(e) {
        // Get form data for localStorage
        const booking = {
            guest: document.getElementById("guestName").value,
            phone: document.getElementById("phoneNumber").value,
            room: document.getElementById("roomNumber").value,
            type: document.getElementById("roomType").value,
            checkIn: document.getElementById("checkIn").value,
            checkOut: document.getElementById("checkOut").value,
            amount: document.getElementById("amount").value,
            idType: document.getElementById("idType").value,
            idNumber: document.getElementById("idNumber").value,
            receiptId: document.getElementById("receiptId").value,
            dateFilled: document.getElementById("dateFilled").value
        };

        bookings.push(booking);
        localStorage.setItem("bookings", JSON.stringify(bookings));
        
        renderTable();
        alert("✅ Booking saved successfully! Email sent to management.");

        // Allow FormSubmit to work (small delay then reset)
        setTimeout(() => {
            form.reset();
            document.getElementById("dateFilled").value = new Date().toISOString().split("T")[0];
        }, 500);
    });

    // Search
    searchInput.addEventListener("input", () => {
        const term = searchInput.value.toLowerCase().trim();
        const filtered = bookings.filter(b => 
            (b.guest && b.guest.toLowerCase().includes(term)) ||
            (b.phone && b.phone.includes(term)) ||
            (b.room && b.room.toLowerCase().includes(term)) ||
            (b.receiptId && b.receiptId.toLowerCase().includes(term)) ||
            (b.idNumber && b.idNumber.toLowerCase().includes(term))
        );
        renderTable(filtered);
    });

    // Actions
    tableBody.addEventListener("click", (e) => {
        if (e.target.classList.contains("delete-btn")) {
            if (confirm("Delete this booking?")) {
                const index = parseInt(e.target.dataset.index);
                bookings.splice(index, 1);
                localStorage.setItem("bookings", JSON.stringify(bookings));
                renderTable();
            }
        }
    });

    renderTable();
});
</script>
</body>
</html>
